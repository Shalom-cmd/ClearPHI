<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClearPHI — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0f1f3d;
    --navy-light: #162a52;
    --blue: #1a56db;
    --teal: #0891b2;
    --cream: #f8f7f4;
    --white: #ffffff;
    --gray-100: #f3f4f6;
    --gray-200: #e5e7eb;
    --gray-400: #9ca3af;
    --gray-600: #4b5563;
    --gray-800: #1f2937;
    --red: #dc2626;
    --red-light: #fef2f2;
    --shadow-md: 0 4px 24px rgba(0,0,0,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--navy);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(26,86,219,0.15) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(8,145,178,0.1) 0%, transparent 50%);
  }

  .login-card {
    background: var(--white);
    border-radius: 16px;
    box-shadow: var(--shadow-md);
    width: 100%;
    max-width: 400px;
    overflow: hidden;
    animation: fadeUp 0.4s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .login-header {
    background: var(--navy);
    padding: 32px 36px 28px;
    text-align: center;
  }

  .logo-mark {
    width: 52px;
    height: 52px;
    background: linear-gradient(135deg, var(--blue), var(--teal));
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 700;
    color: white;
    letter-spacing: -1px;
    margin: 0 auto 16px;
    font-family: 'Playfair Display', serif;
  }

  .login-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--white);
    font-weight: 600;
    margin-bottom: 4px;
    letter-spacing: 0.3px;
  }

  .login-header p {
    font-size: 12px;
    color: var(--gray-400);
    letter-spacing: 0.3px;
  }

  .login-body {
    padding: 32px 36px 36px;
  }

  .field-label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--gray-600);
    margin-bottom: 8px;
    letter-spacing: 0.2px;
  }

  .field-input {
    width: 100%;
    padding: 13px 16px;
    border: 1.5px solid var(--gray-200);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--gray-800);
    background: var(--gray-100);
    transition: all 0.2s;
    outline: none;
  }

  .field-input:focus {
    border-color: var(--blue);
    background: var(--white);
    box-shadow: 0 0 0 3px rgba(26,86,219,0.1);
  }

  .field-input.error {
    border-color: var(--red);
    background: var(--red-light);
  }

  .error-msg {
    display: none;
    font-size: 13px;
    color: var(--red);
    margin-top: 8px;
  }

  .error-msg.visible { display: block; }

  .btn-login {
    width: 100%;
    margin-top: 24px;
    padding: 15px;
    background: var(--navy);
    color: white;
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.3px;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-login:hover:not(:disabled) {
    background: var(--navy-light);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(15,31,61,0.3);
  }

  .btn-login:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
  }

  .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .login-footer {
    text-align: center;
    padding-top: 20px;
    font-size: 11px;
    color: var(--gray-400);
    border-top: 1px solid var(--gray-100);
    margin-top: 24px;
    line-height: 1.6;
  }
</style>
</head>
<body>

<div class="login-card">
  <div class="login-header">
    <div class="logo-mark">CP</div>
    <h1>ClearPHI</h1>
    <p>Patient De-Identification System</p>
  </div>
  <div class="login-body">
    <label class="field-label" for="password">Access Password</label>
    <input
      class="field-input"
      type="password"
      id="password"
      placeholder="Enter password"
      autocomplete="current-password"
      autofocus
    />
    <div class="error-msg" id="errorMsg">Incorrect password. Please try again.</div>

    <button class="btn-login" id="loginBtn">
      <span id="btnContent">🔐 Sign In</span>
    </button>

    <div class="login-footer">
      🔒 All documents are processed locally<br>
      No patient data leaves this device
    </div>
  </div>
</div>

<script>
  const passwordInput = document.getElementById('password');
  const loginBtn = document.getElementById('loginBtn');
  const errorMsg = document.getElementById('errorMsg');
  const btnContent = document.getElementById('btnContent');

  function setLoading(on) {
    loginBtn.disabled = on;
    btnContent.innerHTML = on
      ? '<span class="spinner"></span>'
      : '🔐 Sign In';
  }

  async function doLogin() {
    const password = passwordInput.value.trim();
    if (!password) return;

    errorMsg.classList.remove('visible');
    passwordInput.classList.remove('error');
    setLoading(true);

    try {
      const response = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password })
      });

      const data = await response.json();

      if (response.ok && data.success) {
        window.location.href = '/';
      } else {
        passwordInput.classList.add('error');
        errorMsg.classList.add('visible');
        passwordInput.value = '';
        passwordInput.focus();
        setLoading(false);
      }
    } catch (err) {
      errorMsg.textContent = 'Connection error. Make sure the service is running.';
      errorMsg.classList.add('visible');
      setLoading(false);
    }
  }

  loginBtn.addEventListener('click', doLogin);
  passwordInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
</script>
</body>
</html>
